root = "."
tmp_dir = "tmp"

[build]
  cmd = "CGO_ENABLED=0 go build -buildvcs=false -ldflags='-w -s' -o ./tmp/cinemaker ."
  bin = "./tmp/cinemaker"
  full_bin = "./tmp/cinemaker"
  include_ext = ["go", "yaml"]
  exclude_dir = ["tmp", "vendor", "web", "node_modules", "data", "docs", ".git", ".cursor"]
  exclude_regex = ["_test\\.go$"]
  poll = true
  poll_interval = 1000
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
