services:
  cinemaker:
    image: cinemaker-cinemaker:latest
    container_name: cinemaker
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Docker Hub 镜像源（注意末尾斜杠）
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-}
        # npm 镜像源
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        # Go 代理
        GO_PROXY: ${GO_PROXY:-}
        # Alpine apk 镜像源
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    ports:
      - "7860:5678"
    volumes:
      # 持久化数据目录（使用命名卷，容器内以 root 运行）
      - ./data:/app/data
      # 挂载配置文件（可选，如需自定义配置请取消注释）
      - ./configs/config.yaml:/app/configs/config.yaml:ro
      # 注意：如果使用本地目录挂载，需要确保目录权限正确
      # 例如：- ./data:/app/data （需要 chmod 777 ./data）
    environment:
      - TZ=Asia/Shanghai
      # --- AI 服务密钥（环境变量优先，未设置则从 Web 设置页的数据库配置读取）---
      # 文本 LLM（剧本生成等）
      - TEXT_API_KEY=${TEXT_API_KEY:-}
      - TEXT_BASE_URL=${TEXT_BASE_URL:-}
      - TEXT_MODEL=${TEXT_MODEL:-}
      - TEXT_PROVIDER=${TEXT_PROVIDER:-}
      # 视觉 LLM（画面分析）
      - VISION_API_KEY=${VISION_API_KEY:-}
      - VISION_BASE_URL=${VISION_BASE_URL:-}
      - VISION_MODEL=${VISION_MODEL:-}
      - VISION_PROVIDER=${VISION_PROVIDER:-}
      # 图片生成
      - IMAGE_API_KEY=${IMAGE_API_KEY:-}
      - IMAGE_BASE_URL=${IMAGE_BASE_URL:-}
      - IMAGE_MODEL=${IMAGE_MODEL:-}
      - IMAGE_PROVIDER=${IMAGE_PROVIDER:-}
      # 视频生成
      - VIDEO_API_KEY=${VIDEO_API_KEY:-}
      - VIDEO_BASE_URL=${VIDEO_BASE_URL:-}
      - VIDEO_MODEL=${VIDEO_MODEL:-}
      - VIDEO_PROVIDER=${VIDEO_PROVIDER:-}
      # 语音识别（火山引擎 BigASR）
      - ASR_APP_ID=${ASR_APP_ID:-}
      - ASR_ACCESS_KEY=${ASR_ACCESS_KEY:-}
      - ASR_RESOURCE_ID=${ASR_RESOURCE_ID:-volc.bigasr.auc}
      # 存储：默认本地路径
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      # 访问宿主机服务说明：
      # 使用 host.docker.internal 代替 127.0.0.1
      # 例如：http://host.docker.internal:11434 (Ollama)
    extra_hosts:
      - "host.docker.internal:host-gateway"  # 统一支持所有平台
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - cinemaker-network

volumes:
  cinemaker-data:
    driver: local

networks:
  cinemaker-network:
    driver: bridge
