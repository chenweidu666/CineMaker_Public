app:
  name: "CineMaker API"
  version: "1.0.0"
  debug: true
  language: "zh" # 系统语言：zh(中文) 或 en(英文)

server:
  port: 5678
  host: "0.0.0.0"
  cors_origins:
    - "http://localhost:3012"
  read_timeout: 600
  write_timeout: 600

database:
  type: "sqlite"
  path: "./data/drama_generator.db"
  max_idle: 10
  max_open: 100

storage:
  type: "local"   # "local" 或 "cos"
  local_path: "./data/storage"
  base_url: "http://localhost:5678/static"
  cos:
    bucket: ""
    region: "ap-shanghai"
    secret_id: ""
    secret_key: ""
    cdn_url: ""

ai:
  default_text_provider: "openai"
  default_image_provider: "openai"
  default_video_provider: "doubao"

jwt:
  secret: "cinemaker-default-jwt-secret-change-me"
  access_token_ttl: 30   # minutes
  refresh_token_ttl: 7   # days
